<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Clockify Panel</title>
<style>
  :root {
    --bg: #1c1f26;
    --panel: #242833;
    --ink: #e8eaf0;
    --muted: #8b91a3;
    --field: #2c303c;
    --field-border: #3a3f4d;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    height: 100dvh;
    background: radial-gradient(1200px 800px at 50% -10%, #262b36, var(--bg));
    color: var(--ink);
    font: 15px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(4px, 2vw, 24px);
    overflow: hidden;
  }
  /* The panel is a flex column capped at the viewport: the button grid flexes
     to fill leftover space and shrinks when the window is short, so the
     description field + status line are ALWAYS visible, never clipped. */
  .app {
    width: 100%;
    max-width: 420px;
    min-width: 0;
    height: min(94dvh, 600px);
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid #2f3441;
    border-radius: clamp(12px, 4vw, 22px);
    padding: clamp(9px, 3.5vw, 20px);
    box-shadow: 0 24px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
    overflow: hidden;
  }
  .topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: clamp(8px, 3vw, 16px);
  }
  .title { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .refresh {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--field-border);
    background: var(--field);
    color: var(--ink);
    font-size: 17px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: transform .15s ease, background .15s ease;
  }
  .refresh:hover { background: #333845; }
  .refresh:active { transform: scale(.92); }
  .refresh.spin svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .grid {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: clamp(7px, 2.5vw, 16px);
  }
  .btn {
    position: relative;
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    display: grid;
    place-items: center;
    border-radius: clamp(12px, 5vw, 26px);
    border: none;
    cursor: pointer;
    font-size: clamp(13px, 6vmin, 30px);
    font-weight: 800;
    letter-spacing: .04em;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.45);
    /* raised physical button: top-light gradient + outer shadow + inset rim */
    background:
      radial-gradient(120% 120% at 50% 18%, rgba(255,255,255,.38), rgba(255,255,255,0) 55%),
      linear-gradient(180deg, var(--c-light), var(--c-dark));
    box-shadow:
      0 10px 22px rgba(0,0,0,.45),
      0 2px 0 rgba(0,0,0,.35),
      inset 0 2px 1px rgba(255,255,255,.35),
      inset 0 -6px 10px rgba(0,0,0,.30);
    transition: transform .08s ease, box-shadow .12s ease, filter .12s ease;
    user-select: none;
  }
  .btn:active { transform: translateY(2px); }
  /* When a project is tracking, dim the others so the active one is brighter. */
  .grid.has-active .btn:not(.pressed) { filter: brightness(.48) saturate(.8); }
  .btn.pressed {
    /* selected: brighter, sunk in, colored glow ring */
    transform: translateY(3px);
    filter: brightness(1.14) saturate(1.06);
    background:
      radial-gradient(120% 120% at 50% 82%, rgba(255,255,255,.28), rgba(255,255,255,0) 55%),
      linear-gradient(180deg, var(--c-dark), var(--c-light));
    box-shadow:
      0 0 0 3px rgba(255,255,255,.16),
      0 0 26px 3px var(--c-glow),
      inset 0 8px 14px rgba(0,0,0,.5),
      inset 0 -2px 1px rgba(255,255,255,.2);
  }
  /* Recording indicator: only the tracking button shows it; red + blinking.
     %-based inset + the button's overflow:hidden keep it inside on any resize. */
  .btn .dot { display: none; }
  .btn.pressed .dot {
    display: block;
    position: absolute; top: 8%; right: 8%;
    width: clamp(8px, 2.6vmin, 11px);
    height: clamp(8px, 2.6vmin, 11px);
    border-radius: 50%;
    background: #ff3b30;
    box-shadow: 0 0 6px 1px rgba(255,59,48,.95);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .25; } }
  .app.busy .btn { pointer-events: none; opacity: .9; }

  .field-wrap {
    flex: 0 0 auto;
    position: relative;
    margin-top: clamp(10px, 3vw, 18px);
  }
  .field-wrap input {
    width: 100%;
    padding: clamp(8px, 2.5vw, 13px) clamp(38px, 11vw, 46px) clamp(8px, 2.5vw, 13px) clamp(9px, 3vw, 14px);
    border-radius: clamp(9px, 3vw, 14px);
    border: 1px solid var(--field-border);
    background: var(--field);
    color: var(--ink);
    font-size: clamp(11px, 3.4vw, 14px);
    outline: none;
    transition: border-color .15s ease, opacity .15s ease;
  }
  .field-wrap input:focus { border-color: #5566ff; }
  .field-wrap input:disabled { opacity: .45; cursor: not-allowed; }
  .submit {
    position: absolute;
    right: clamp(4px, 1.5vw, 6px); top: 50%; transform: translateY(-50%);
    width: clamp(26px, 8vw, 34px); height: clamp(26px, 8vw, 34px);
    border-radius: clamp(7px, 2.5vw, 10px);
    border: none;
    background: #3a4150;
    color: var(--ink);
    cursor: pointer;
    display: grid; place-items: center;
    transition: background .15s ease, transform .1s ease;
  }
  .submit:hover:not(:disabled) { background: #49566b; }
  .submit:active:not(:disabled) { transform: translateY(-50%) scale(.9); }
  .submit:disabled { opacity: .35; cursor: not-allowed; }
  .submit.saved { background: #2e7d4f; }

  .status {
    flex: 0 0 auto;
    margin-top: clamp(8px, 2.5vw, 14px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: clamp(10px, 3vw, 12px);
    color: var(--muted);
    min-height: 14px;
  }
  #statusText { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .status .sync { font-variant-numeric: tabular-nums; white-space: nowrap; }
  /* Inline editable start time — lives INSIDE the status row, so it adds no
     extra row and only the width of "HH:MM" (same as the old static time). */
  #startInput {
    width: 4.6ch;
    font: inherit;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    padding: 0;
    margin: 0;
    text-align: center;
    outline: none;
    font-variant-numeric: tabular-nums;
    vertical-align: baseline;
  }
  #startInput:hover, #startInput:focus { border-bottom-color: var(--muted); }
  .banner {
    flex: 0 0 auto;
    margin-top: 12px;
    padding: 9px 12px;
    border-radius: 10px;
    background: rgba(255,107,107,.12);
    border: 1px solid rgba(255,107,107,.4);
    color: var(--danger);
    font-size: 12.5px;
    display: none;
  }
  .banner.show { display: block; }

  /* Narrow tab: drop secondary chrome so the buttons own the space. */
  @media (max-width: 260px) {
    .topbar { margin-bottom: 6px; }
    .title { display: none; }
    .sync { display: none; }
  }
  @media (max-width: 180px) {
    .topbar { justify-content: flex-end; }
  }
  /* Short viewport: same idea by height — keep buttons + field + status legible. */
  @media (max-height: 380px) {
    .title { display: none; }
    .sync { display: none; }
    .topbar { margin-bottom: 6px; }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar" title="Clockify Panel">
      <div class="title" title="Clockify Panel">Time Tracking</div>
      <button class="refresh" id="refresh" title="Refresh from Clockify" aria-label="Refresh">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
        </svg>
      </button>
    </div>

    <div class="grid" id="grid"><!-- buttons injected --></div>

    <div class="field-wrap">
      <input id="desc" type="text" placeholder="No active tracker" disabled
             autocomplete="off" autocapitalize="off" spellcheck="false" />
      <button class="submit" id="submit" title="Save description (Enter)" disabled aria-label="Save">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 10L4 15l5 5"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/>
        </svg>
      </button>
    </div>

    <div class="status">
      <span id="statusText"><span id="statusPrefix">…</span><input id="startInput" type="text"
        inputmode="numeric" maxlength="5" autocomplete="off" spellcheck="false"
        title="Edit start time (HH:MM) — Enter or click away to save" /><span id="statusDur"></span></span>
      <span class="sync" id="syncText"></span>
    </div>
    <div class="banner" id="banner"></div>
  </div>

<script>
(() => {
  const POLL_MS = 10000;
  const grid = document.getElementById('grid');
  const app = document.getElementById('app');
  const refreshBtn = document.getElementById('refresh');
  const desc = document.getElementById('desc');
  const submit = document.getElementById('submit');
  const statusText = document.getElementById('statusText');
  const statusPrefix = document.getElementById('statusPrefix');
  const statusDur = document.getElementById('statusDur');
  const startInput = document.getElementById('startInput');
  const syncText = document.getElementById('syncText');
  const banner = document.getElementById('banner');

  // last state from server; null until first load
  let lastState = null;
  let inFlight = false;
  let projectsRendered = false;
  // live-duration state for the status line
  let activeStartMs = null, activeSince = '', activeKeyLabel = null;

  // ---- color helpers (lighten/darken for the physical look) ----
  const clamp = (n) => Math.max(0, Math.min(255, n));
  function shade(hex, amt) {
    const m = (hex || '#555555').replace('#', '');
    const full = m.length === 3 ? m.split('').map(c => c + c).join('') : m;
    const r = parseInt(full.slice(0,2),16), g = parseInt(full.slice(2,4),16), b = parseInt(full.slice(4,6),16);
    const f = (v) => clamp(Math.round(v + (amt < 0 ? v : (255 - v)) * Math.abs(amt)));
    return `rgb(${f(r)},${f(g)},${f(b)})`;
  }
  function glow(hex) {
    const m = (hex || '#555555').replace('#', '');
    const full = m.length === 3 ? m.split('').map(c => c + c).join('') : m;
    const r = parseInt(full.slice(0,2),16), g = parseInt(full.slice(2,4),16), b = parseInt(full.slice(4,6),16);
    return `rgba(${r},${g},${b},.65)`;
  }

  function renderButtons(projects) {
    grid.innerHTML = '';
    for (const p of projects) {
      const b = document.createElement('button');
      b.className = 'btn';
      b.dataset.key = p.key;
      b.title = p.name;
      b.style.setProperty('--c-light', shade(p.color, 0.18));
      b.style.setProperty('--c-dark', shade(p.color, -0.28));
      b.style.setProperty('--c-glow', glow(p.color));
      b.innerHTML = `<span class="dot"></span>${p.key}`;
      b.addEventListener('click', () => onToggle(p.key));
      grid.appendChild(b);
    }
    projectsRendered = true;
  }

  function paint(state) {
    lastState = state;
    if (!projectsRendered && state.projects) renderButtons(state.projects);

    const active = state.active;
    const activeKey = active ? active.key : null;

    grid.classList.toggle('has-active', !!activeKey);
    for (const btn of grid.querySelectorAll('.btn')) {
      btn.classList.toggle('pressed', btn.dataset.key === activeKey);
    }

    // Description field: editable only when something is running.
    const editing = document.activeElement === desc;
    if (active) {
      desc.disabled = false;
      submit.disabled = false;
      desc.placeholder = 'Task description (optional)';
      // Don't clobber what the user is typing.
      if (!editing && desc.value !== active.description) {
        desc.value = active.description || '';
      }
    } else {
      desc.disabled = true;
      submit.disabled = true;
      if (!editing) desc.value = '';
      desc.placeholder = 'No active tracker';
    }

    // Status line (with live-ticking duration — see renderStatus).
    if (active && active.start) {
      activeStartMs = Date.parse(active.start);
      activeSince = new Date(activeStartMs).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      activeKeyLabel = active.key || '?';
    } else {
      activeStartMs = null; activeKeyLabel = null;
    }
    renderStatus();
  }

  function fmtDur(ms) {
    let s = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(s / 3600); s -= h * 3600;
    const m = Math.floor(s / 60); s -= m * 60;
    const p = (n) => String(n).padStart(2, '0');
    return h > 0 ? `${h}:${p(m)}:${p(s)}` : `${m}:${p(s)}`;
  }
  function hhmm(ms) {
    return new Date(ms).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit', hour12: false});
  }
  function renderStatus() {
    if (activeStartMs) {
      statusPrefix.textContent = `Tracking ${activeKeyLabel} since `;
      startInput.style.display = '';
      // Sync the field from Clockify, but never clobber what the user is typing.
      if (document.activeElement !== startInput) startInput.value = hhmm(activeStartMs);
      statusDur.textContent = ` (${fmtDur(Date.now() - activeStartMs)})`;
    } else {
      statusPrefix.textContent = 'Idle — nothing tracking';
      startInput.style.display = 'none';
      startInput.value = '';
      statusDur.textContent = '';
    }
  }

  async function saveStartTime() {
    if (!activeStartMs) return;
    const m = startInput.value.trim().match(/^(\d{1,2}):(\d{2})$/);
    if (!m) { renderStatus(); return; }            // invalid -> revert to truth
    const hh = +m[1], mm = +m[2];
    if (hh > 23 || mm > 59) { renderStatus(); return; }
    // No change? skip the round-trip.
    if (`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}` === hhmm(activeStartMs)) return;
    // Keep the original date, set the new local time.
    const d = new Date(activeStartMs);
    d.setHours(hh, mm, 0, 0);
    if (d.getTime() > Date.now()) { showError("Start time can't be in the future."); renderStatus(); return; }
    if (inFlight) return;
    setBusy(true);
    try {
      const state = await api('/api/start-time', {method: 'POST', body: JSON.stringify({start: d.toISOString()})});
      clearError(); paint(state); stampSync();
    } catch (e) {
      showError('Could not update start time: ' + e.message);
      await refresh(false);
    } finally {
      setBusy(false);
    }
  }

  function showError(msg) {
    banner.textContent = msg;
    banner.classList.add('show');
  }
  function clearError() {
    banner.classList.remove('show');
  }
  function stampSync() {
    const t = new Date();
    syncText.textContent = 'synced ' + t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function setBusy(on) {
    inFlight = on;
    app.classList.toggle('busy', on);
    refreshBtn.classList.toggle('spin', on);
  }

  async function api(path, opts) {
    const res = await fetch(path, Object.assign({headers: {'Content-Type':'application/json'}}, opts));
    let data = null;
    try { data = await res.json(); } catch (_) {}
    if (!data) throw new Error(`Server returned ${res.status}`);
    if (data.ok === false) throw new Error(data.error || 'Unknown error');
    return data;
  }

  async function refresh(showSpinner) {
    if (inFlight) return;
    if (showSpinner) refreshBtn.classList.add('spin');
    try {
      const state = await api('/api/state', {method:'GET'});
      clearError();
      paint(state);
      stampSync();
    } catch (e) {
      showError('Sync failed: ' + e.message + ' — buttons show last confirmed state.');
    } finally {
      if (showSpinner) refreshBtn.classList.remove('spin');
    }
  }

  async function onToggle(key) {
    if (inFlight) return;
    setBusy(true);
    try {
      // If a tracker is running, carry the current field text so the server
      // saves it onto the entry being completed before stopping/switching.
      const payload = {projectKey: key};
      if (lastState && lastState.active && !desc.disabled) {
        payload.description = desc.value;
      }
      const state = await api('/api/toggle', {method:'POST', body: JSON.stringify(payload)});
      clearError();
      paint(state);
      stampSync();
    } catch (e) {
      showError('Action failed: ' + e.message);
      // Re-fetch truth rather than guessing.
      await refresh(false);
    } finally {
      setBusy(false);
    }
  }

  async function saveDescription() {
    if (inFlight || desc.disabled) return;
    setBusy(true);
    try {
      const state = await api('/api/description', {method:'POST', body: JSON.stringify({description: desc.value})});
      clearError();
      paint(state);
      stampSync();
      submit.classList.add('saved');
      setTimeout(() => submit.classList.remove('saved'), 900);
      desc.blur();
    } catch (e) {
      showError('Could not save description: ' + e.message);
      await refresh(false);
    } finally {
      setBusy(false);
    }
  }

  // ---- events ----
  refreshBtn.addEventListener('click', () => refresh(true));
  submit.addEventListener('click', saveDescription);
  desc.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); saveDescription(); } });
  // Start-time field: save on Enter (via blur) or when focus leaves.
  startInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); startInput.blur(); } });
  startInput.addEventListener('blur', saveStartTime);

  // Refresh on focus / visibility (catches changes made elsewhere).
  window.addEventListener('focus', () => refresh(false));
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(false); });

  // Light interval poll.
  setInterval(() => { if (!document.hidden) refresh(false); }, POLL_MS);

  // Tick the live duration once a second (independent of the network poll).
  setInterval(renderStatus, 1000);

  // Initial load.
  refresh(true);
})();
</script>
</body>
</html>
